name: Build & publish Flutter base image

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/flutter

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Flutter version from git tag
        id: vars
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log version
        run: echo "Building Flutter version ${{ steps.vars.outputs.version }}"

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: images/base/Dockerfile

      - name: Build test image
        run: |
          docker build \
            --platform=linux/amd64 \
            -f images/base/Dockerfile \
            --build-arg FLUTTER_VERSION=${{ steps.vars.outputs.version }} \
            -t test-flutter-base:${{ steps.vars.outputs.version }} \
            images/base

      - name: Smoke + web build test
        run: |
          docker run --rm \
            --platform=linux/amd64 \
            -e FLUTTER_SUPPRESS_ANALYTICS=true \
            test-flutter-base:${{ steps.vars.outputs.version }} \
            sh -c '
              flutter --version &&
              flutter create test_app &&
              cd test_app &&
              flutter build web
            '

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.version }}-base
            type=raw,value=${{ steps.vars.outputs.version }}
            type=raw,value=latest
            type=raw,value=web
            type=raw,value=base
          labels: |
            org.opencontainers.image.title=flutter
            org.opencontainers.image.description='Flutter is an open source framework for building beautiful, natively compiled, multi-platform applications from a single codebase.'
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}#readme
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=Artem Zolochevskii
            org.opencontainers.image.authors=Artem Zolochevskii

      - name: Build & push base image
        uses: docker/build-push-action@v6
        with:
          context: images/base
          file: images/base/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            FLUTTER_VERSION=${{ steps.vars.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
